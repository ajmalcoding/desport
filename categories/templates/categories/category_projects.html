{% extends 'base.html' %}

    {% block content %}
    <!-- Portfolio Grid Section -->
    <section class="py-20 px-4">
        <div class="container mx-auto">
            <div class="flex items-center justify-between mb-12">
                <div>
                    <h2 class="text-3xl md:text-4xl font-bold text-foreground mb-2">
                        {{ category.name }}
                    </h2>
                    <p class="text-muted-foreground">
                        Discover exceptional projects from our creative community
                    </p>
                </div>
            </div>
            {% if projects %}
            {% include 'includes/project_cards.html' %}
            {% else %}
            <!-- If no projects in this category -->
                <h2 class="text-3xl md:text-4xl font-bold text-foreground text-center py-32">
                    No projects found in this category
                </h2>
            {% endif %}
        </div>
    </section>
    {% endblock %}
