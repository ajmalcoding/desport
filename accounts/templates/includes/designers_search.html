<!-- Designer Search Header -->
<section class="py-16 px-4">
    <div class="container mx-auto text-center">
        <h1 class="text-4xl md:text-5xl font-bold text-foreground mb-4 animate-fade-up">
            Find <span class="gradient-text">Designers</span>
        </h1>
        <p class="text-muted-foreground max-w-2xl mx-auto mb-8 animate-fade-up" style="animation-delay: 0.1s;">
            Browse talented creative professionals ready to bring your vision to life
        </p>
        <form method="get">
        <div class="max-w-3xl mx-auto animate-fade-up" style="animation-delay: 0.2s;">
            <div class="relative">
                <button type="submit" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-muted-foreground">
                <svg xmlns="http://www.w3.org/2000/svg"  fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg></button>
                <input 
                    type="text" 
                    name="q" 
                    value="{{ request.GET.q }}"
                    placeholder="Search by name, category or location..." 
                    class="w-full pl-12 pr-4 py-4 rounded-2xl bg-card border border-border text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-base"
                >
            </div>
        </div>
        </form>
    </div>
</section>
