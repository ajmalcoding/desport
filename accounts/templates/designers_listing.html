{% extends "base.html" %}

{% block content %}
    {% include "includes/designers_search.html" %}

    <!-- Main Content: Filters + Grid -->
    <section class="px-4 pb-20">
        <div class="container mx-auto">
            <!-- Mobile Filter Toggle -->
            <div class="lg:hidden mb-6">
                <button id="mobile-filter-toggle" onclick="toggleMobileFilters()" class="flex items-center gap-2 px-4 py-2.5 rounded-xl border border-border text-sm font-medium hover:bg-muted transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
                    </svg>
                    Filters
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <!-- Sidebar -->
                <div class="lg:col-span-1">
                    <form method="get">
                    {% include "includes/designers_filters.html" %}
                    </form>
                </div>
                <!-- Results -->
                <div class="lg:col-span-3">
                    {% include "includes/designers_grid.html" %}
                </div>
            </div>
        </div>
    </section>

<script>
    // Mobile filter toggle
    function toggleMobileFilters() {
        const panel = document.getElementById('filters-panel');
        panel.classList.toggle('hidden');
    }

    // Sort designers
    function sortDesigners() {
        const sortValue = document.getElementById('sort-select').value;
        const grid = document.getElementById('designers-grid');
        const cards = Array.from(grid.children);

        cards.sort((a, b) => {
            if (sortValue === 'newest') {
                return parseInt(b.dataset.order) - parseInt(a.dataset.order);
            }
            // Relevance = original order
            return parseInt(a.dataset.order) - parseInt(b.dataset.order);
        });

        cards.forEach(card => grid.appendChild(card));
    }

</script>
{% endblock %}
